name: Cycleline
options:
  bundleIdPrefix: com.shimondeitel.cyclelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Cycleline:
    type: application
    platform: iOS
    sources:
      - path: Cycleline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cyclelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cycleline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CyclelineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CyclelineTests
      - path: Cycleline.storekit
    dependencies:
      - target: Cycleline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cyclelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CyclelineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CyclelineUITests
    dependencies:
      - target: Cycleline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cyclelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Cycleline:
    build:
      targets:
        Cycleline: all
        CyclelineTests: [test]
        CyclelineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Cycleline.storekit
    test:
      config: Debug
      storeKitConfiguration: Cycleline.storekit
      targets:
        - CyclelineTests
        - CyclelineUITests
    archive:
      config: Release
